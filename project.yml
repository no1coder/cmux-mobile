name: cmux-mobile
options:
  bundleIdPrefix: com.manaflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  cmux-mobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: App
    resources:
      - path: Resources/Assets.xcassets
      - path: Sources/Resources
        type: folder
    settings:
      base:
        INFOPLIST_FILE: SupportingFiles/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rooyun.devpod
        PRODUCT_NAME: "Devpod"
        PRODUCT_MODULE_NAME: "cmux_mobile"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/cmux-mobile.entitlements
        DEVELOPMENT_TEAM: "69A75B6U2B"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
    dependencies:
      - target: cmuxWidget
        embed: true
        codeSign: true

  cmuxWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: cmuxWidget
      - path: Sources/Models/CmuxActivityAttributes.swift
    settings:
      base:
        INFOPLIST_FILE: cmuxWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.rooyun.devpod.widget
        PRODUCT_NAME: "cmuxWidget"
        DEVELOPMENT_TEAM: "69A75B6U2B"
        TARGETED_DEVICE_FAMILY: "1,2"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
        SKIP_INSTALL: "YES"

  cmux-mobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: Sources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Devpod.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Devpod"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: cmux-mobile

schemes:
  Devpod:
    build:
      targets:
        cmux-mobile: all
        cmuxWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - cmux-mobileTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
