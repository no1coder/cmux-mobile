name: cmux-mobile
options:
  bundleIdPrefix: com.manaflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  cmux-mobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: App
    resources:
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: SupportingFiles/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.manaflow.cmux-mobile
        PRODUCT_NAME: "cmux mobile"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/cmux-mobile.entitlements
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"

  cmux-mobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: Sources
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/cmux mobile.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/cmux mobile"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: cmux-mobile
